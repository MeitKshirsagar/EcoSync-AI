services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      - ECOSYNC_DATA_SOURCE=mock
      - ECOSYNC_CORS_ORIGINS=http://localhost:5173,http://localhost:80
    volumes:
      - backend-data:/app/data
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8000/api/health" ]
      interval: 10s
      timeout: 5s
      retries: 3

  frontend:
    build: ./frontend
    ports:
      - "5173:80"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  backend-data:
